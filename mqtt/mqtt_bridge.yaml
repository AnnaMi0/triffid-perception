# =============================================================
# TRIFFID Perception – mqtt_client bridge configuration
# Bridges ROS 2 GeoJSON topic → local MQTT broker
# Package: mqtt_client (ika-rwth-aachen)
# =============================================================

/**:
  ros__parameters:
    broker:
      host: localhost
      port: 1883

    bridge:
      ros2mqtt:
        ros_topics:
          - /triffid/front/geojson
        /triffid/front/geojson:
          mqtt_topic: triffid/ugv/geojson
          primitive: true          # std_msgs/String → plain string payload
