# =============================================================
# TRIFFID Perception – Mosquitto MQTT broker config
# Local-only broker for capturing GeoJSON MQTT traces
# =============================================================

# ── Listener ─────────────────────────────────────────────────
listener 1883 127.0.0.1
protocol mqtt

# ── Authentication ───────────────────────────────────────────
allow_anonymous true

# ── Logging ──────────────────────────────────────────────────
log_dest file /ws/mqtt_traces/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# ── Persistence ──────────────────────────────────────────────
persistence false
