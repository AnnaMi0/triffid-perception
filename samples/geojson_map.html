<!DOCTYPE html>
<html>
<head>
<title>TRIFFID GeoJSON Verification</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    .info { padding: 6px 8px; font: 14px Arial; background: white;
             box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px;
             max-width: 350px; }
    .info h4 { margin: 0 0 5px; }
</style>
</head>
<body>
<div id="map"></div>
<script>
    // Base layers
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 22,
        attribution: '&copy; OpenStreetMap'
    });
    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 22,
        attribution: '&copy; Esri'
    });

    var map = L.map('map', {
        center: [49.72630721218235, 13.35195603955419],
        zoom: 19,
        layers: [satellite]
    });

    L.control.layers({
        "Satellite": satellite,
        "OpenStreetMap": osm
    }).addTo(map);

    var overlays = {};

    // Add feature layers
    
        (function() {
            var data = {"type": "FeatureCollection", "features": [{"type": "Feature", "id": "215", "geometry": {"type": "Polygon", "coordinates": [[[13.351969930943785, 49.72634013952728], [13.35196830816099, 49.726323027451066], [13.351952856027738, 49.726323639792014], [13.351954478810532, 49.72634075186823], [13.351969930943785, 49.72634013952728]]]}, "properties": {"class": "Building", "id": "215", "confidence": 0.3976682424545288, "category": "infrastructure", "detection_type": "seg", "source": "ugv", "local_frame": false, "marker-color": "#708090", "marker-size": "medium", "marker-symbol": "building", "stroke": "#708090", "stroke-width": 2, "stroke-opacity": 1.0, "fill": "#708090", "fill-opacity": 0.25, "_frame": 2516}}]};
            var layer = L.geoJSON(data, {
                style: function(feature) {
                    return {
                        color: '#708090',
                        weight: 2,
                        fillColor: '#708090',
                        fillOpacity: 0.3
                    };
                },
                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, {
                        radius: 6,
                        fillColor: '#708090',
                        color: '#000',
                        weight: 1,
                        fillOpacity: 0.8
                    });
                },
                onEachFeature: function(feature, layer) {
                    var p = feature.properties;
                    layer.bindPopup(
                        '<b>' + p['class'] + '</b> (ID: ' + p.id + ')<br>' +
                        'Confidence: ' + (p.confidence * 100).toFixed(1) + '%<br>' +
                        'Category: ' + p.category + '<br>' +
                        'Frame: ' + p._frame
                    );
                }
            });
            overlays["Building (1)"] = layer;
            layer.addTo(map);
        })();
        (function() {
            var data = {"type": "FeatureCollection", "features": [{"type": "Feature", "id": "212", "geometry": {"type": "Polygon", "coordinates": [[[13.351980079115833, 49.726314618880636], [13.351978698071783, 49.72629742367305], [13.351977310291671, 49.72629747024967], [13.35197869133572, 49.72631466545725], [13.351980079115833, 49.726314618880636]]]}, "properties": {"class": "Road", "id": "212", "confidence": 0.9069914817810059, "category": "infrastructure", "detection_type": "seg", "source": "ugv", "local_frame": false, "marker-color": "#a9a9a9", "marker-size": "medium", "marker-symbol": "marker", "stroke": "#a9a9a9", "stroke-width": 2, "stroke-opacity": 1.0, "fill": "#a9a9a9", "fill-opacity": 0.25, "_frame": 2509}}, {"type": "Feature", "id": "212", "geometry": {"type": "Polygon", "coordinates": [[[13.351981125962265, 49.72631568519769], [13.351979985312118, 49.726297971343], [13.351978596865216, 49.72629800870378], [13.351979737515363, 49.72631572255846], [13.351981125962265, 49.72631568519769]]]}, "properties": {"class": "Road", "id": "212", "confidence": 0.8968825340270996, "category": "infrastructure", "detection_type": "seg", "source": "ugv", "local_frame": false, "marker-color": "#a9a9a9", "marker-size": "medium", "marker-symbol": "marker", "stroke": "#a9a9a9", "stroke-width": 2, "stroke-opacity": 1.0, "fill": "#a9a9a9", "fill-opacity": 0.25, "_frame": 2510}}, {"type": "Feature", "id": "212", "geometry": {"type": "Polygon", "coordinates": [[[13.351982830699187, 49.726317351452536], [13.351981898357852, 49.72629845113851], [13.351980509414581, 49.72629847976958], [13.351981441755916, 49.72631738008361], [13.351982830699187, 49.726317351452536]]]}, "properties": {"class": "Road", "id": "212", "confidence": 0.7323828935623169, "category": "infrastructure", "detection_type": "seg", "source": "ugv", "local_frame": false, "marker-color": "#a9a9a9", "marker-size": "medium", "marker-symbol": "marker", "stroke": "#a9a9a9", "stroke-width": 2, "stroke-opacity": 1.0, ", "fill-opacity": 0.25, "_frame": 2518}}]};
            var layer = L.geoJSON(data, {
                style: function(feature) {
                    return {
                        color: '#a9a9a9',
                        weight: 2,
                        fillColor: '#a9a9a9',
                        fillOpacity: 0.3
                    };
                },
                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, {
                        radius: 6,
                        fillColor: '#a9a9a9',
                        color: '#000',
                        weight: 1,
                        fillOpacity: 0.8
                    });
                },
                onEachFeature: function(feature, layer) {
                    var p = feature.properties;
                    layer.bindPopup(
                        '<b>' + p['class'] + '</b> (ID: ' + p.id + ')<br>' +
                        'Confidence: ' + (p.confidence * 100).toFixed(1) + '%<br>' +
                        'Category: ' + p.category + '<br>' +
                        'Frame: ' + p._frame
                    );
                }
            });
            overlays["Road (9)"] = layer;
            layer.addTo(map);
        })();

    // Add layer control for classes
    L.control.layers(null, overlays, {collapsed: false}).addTo(map);

    // Robot approximate path
    var path = [[49.72630604456515, 13.351978694703751], [49.726306846950735, 13.35197986141374], [49.72630791561106, 13.351981670056883], [49.72628207270712, 13.351925248110128], [49.72628250003038, 13.351926980960332], [49.726283965436785, 13.351932573449732], [49.72628373146167, 13.351932761483209], [49.72633188965965, 13.35196139348576], [49.72634356713072, 13.351970465964353], [49.72634358827028, 13.351970745914015]];
    if (path.length > 1) {
        L.polyline(path, {color: 'yellow', weight: 3, dashArray: '5,10', opacity: 0.7}).addTo(map);
    }

    // Info box
    var info = L.control({position: 'bottomleft'});
    info.onAdd = function() {
        var div = L.DomUtil.create('div', 'info');
        div.innerHTML = '<h4>TRIFFID GeoJSON Verify</h4>' +
            'Frames shown: 10<br>' +
            'Total features: 10<br>' +
            'Classes: 2<br>' +
            '<small>Yellow dashed = approx robot path</small>';
        return div;
    };
    info.addTo(map);
</script>
</body>
</html>
